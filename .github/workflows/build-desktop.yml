name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check desktop app folder
        id: app_check
        shell: bash
        run: |
          if [ -f "apps/desktop/package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.app_check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        if: steps.app_check.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        if: steps.app_check.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux/macOS deps
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install create-dmg

      - name: Validate macOS signing/notary secrets (tag release)
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$APPLE_CERTIFICATE_BASE64" || (echo "Missing secret APPLE_CERTIFICATE_BASE64" && exit 1)
          test -n "$APPLE_CERTIFICATE_PASSWORD" || (echo "Missing secret APPLE_CERTIFICATE_PASSWORD" && exit 1)
          test -n "$APPLE_SIGNING_IDENTITY" || (echo "Missing secret APPLE_SIGNING_IDENTITY" && exit 1)
          test -n "$APPLE_KEYCHAIN_PASSWORD" || (echo "Missing secret APPLE_KEYCHAIN_PASSWORD" && exit 1)
          test -n "$APPLE_ID" || (echo "Missing secret APPLE_ID" && exit 1)
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || (echo "Missing secret APPLE_APP_SPECIFIC_PASSWORD" && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "Missing secret APPLE_TEAM_ID" && exit 1)

      - name: Import Apple signing certificate
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_KEYCHAIN_NAME: aria-signing.keychain-db
        run: bash scripts/macos-import-signing-cert.sh

      - name: Install dependencies
        if: steps.app_check.outputs.ready == 'true'
        shell: bash
        working-directory: apps/desktop
        run: pnpm install --no-frozen-lockfile

      - name: Build macOS installers (arm64 + x64)
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'macOS'
        shell: bash
        working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          rustup target add x86_64-apple-darwin
          pnpm run build
          pnpm tauri build --target x86_64-apple-darwin

      - name: Notarize and staple macOS artifacts
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/macos-notarize-and-staple.sh apps/desktop/src-tauri/target

      - name: Verify macOS artifacts with Gatekeeper
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: bash scripts/macos-verify-gatekeeper.sh apps/desktop/src-tauri/target

      - name: Build Windows installers
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'Windows'
        shell: bash
        working-directory: apps/desktop
        run: pnpm run build

      - name: Upload desktop artifacts
        if: steps.app_check.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
            apps/desktop/src-tauri/target/*/release/bundle/**

      - name: Publish macOS assets to GitHub Release
        if: steps.app_check.outputs.ready == 'true' && startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz

      - name: Publish Windows assets to GitHub Release
        if: steps.app_check.outputs.ready == 'true' && startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Skip message
        if: steps.app_check.outputs.ready != 'true'
        shell: bash
        run: echo "Desktop app not found yet. Skipping build."
