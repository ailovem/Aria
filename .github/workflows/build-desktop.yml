name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check desktop app folder
        id: app_check
        shell: bash
        run: |
          if [ -f "apps/desktop/package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.app_check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        if: steps.app_check.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        if: steps.app_check.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux/macOS deps
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install create-dmg

      - name: Install dependencies
        if: steps.app_check.outputs.ready == 'true'
        shell: bash
        working-directory: apps/desktop
        run: pnpm install --no-frozen-lockfile

      - name: Build macOS installers (arm64 + x64)
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'macOS'
        shell: bash
        working-directory: apps/desktop
        run: |
          rustup target add x86_64-apple-darwin
          pnpm run build
          pnpm tauri build --target x86_64-apple-darwin

      - name: Build Windows installers
        if: steps.app_check.outputs.ready == 'true' && runner.os == 'Windows'
        shell: bash
        working-directory: apps/desktop
        run: pnpm run build

      - name: Upload desktop artifacts
        if: steps.app_check.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
            apps/desktop/src-tauri/target/*/release/bundle/**

      - name: Publish macOS assets to GitHub Release
        if: steps.app_check.outputs.ready == 'true' && startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz

      - name: Publish Windows assets to GitHub Release
        if: steps.app_check.outputs.ready == 'true' && startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Skip message
        if: steps.app_check.outputs.ready != 'true'
        shell: bash
        run: echo "Desktop app not found yet. Skipping build."
