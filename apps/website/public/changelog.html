<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria Changelog</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #060607;
        --panel: #121317;
        --text: #f4f6fb;
        --subtle: #a7adbd;
        --line: rgba(255, 255, 255, 0.12);
        --accent: #6bc6ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, rgba(107, 198, 255, 0.1), transparent 40%), var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }
      h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.03em;
      }
      .sub {
        color: var(--subtle);
        margin-top: 10px;
      }
      .back {
        margin-top: 18px;
        display: inline-block;
        color: var(--accent);
        text-decoration: none;
      }
      .entry {
        margin-top: 24px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(18, 19, 23, 0.9);
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }
      .version {
        font-size: 22px;
        font-weight: 600;
      }
      .date {
        color: var(--subtle);
        font-size: 14px;
      }
      h3 {
        margin: 16px 0 10px;
        font-size: 15px;
        color: var(--accent);
      }
      ul {
        margin: 0;
        padding-left: 20px;
        color: #dfe3f0;
        line-height: 1.65;
      }
      li + li { margin-top: 6px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Aria 更新日志</h1>
      <p id="sub" class="sub">加载中...</p>
      <a class="back" href="/">← 返回官网首页</a>
      <section id="list"></section>
    </main>
    <script>
      (async () => {
        const sub = document.getElementById("sub");
        const list = document.getElementById("list");
        try {
          const res = await fetch("/releases/changelog.json", { cache: "no-store" });
          if (!res.ok) throw new Error("failed");
          const data = await res.json();
          const entries = Array.isArray(data.entries) ? data.entries : [];
          sub.textContent = `${data.product || "Aria"} · 共 ${entries.length} 个版本`;
          list.innerHTML = entries.map((entry) => {
            const highlights = Array.isArray(entry.highlights) ? entry.highlights : [];
            const fixes = Array.isArray(entry.fixes) ? entry.fixes : [];
            return `
              <article class="entry">
                <div class="head">
                  <span class="version">${entry.version || "Unknown"}</span>
                  <span class="date">${entry.date || ""}</span>
                </div>
                ${highlights.length ? `<h3>Highlights</h3><ul>${highlights.map((item) => `<li>${item}</li>`).join("")}</ul>` : ""}
                ${fixes.length ? `<h3>Fixes</h3><ul>${fixes.map((item) => `<li>${item}</li>`).join("")}</ul>` : ""}
              </article>
            `;
          }).join("");
        } catch {
          sub.textContent = "更新日志读取失败，请稍后重试。";
        }
      })();
    </script>
  </body>
</html>
