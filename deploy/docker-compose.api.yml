version: "3.9"

services:
  aria-api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: aria-api-v3
    ports:
      - "8787:8787"
    environment:
      ARIA_API_HOST: 0.0.0.0
      ARIA_API_PORT: 8787
      ARIA_TOKEN_SECRET: ${ARIA_TOKEN_SECRET:-aria-local-secret}
      ARIA_TOKEN_TTL_SECONDS: ${ARIA_TOKEN_TTL_SECONDS:-604800}
    volumes:
      - ../services/api/data:/app/services/api/data
    restart: unless-stopped
